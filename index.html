<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Estudando JavaScript</h1>
            <p id="textoAleatorio">Clique no botão abaixo para gerar uma frase!</p>
            <button id="botao">Mudar Frase</button>
        </section>

        <section class="card">
            <form>
                <label for="fraseNova">Digite uma nova frase:</label>
                <div class="input-group">
                    <input type="text" id="fraseNova" placeholder="Ex: Estudar">
                    <button type="submit" id="botaoAdd">Salvar</button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
